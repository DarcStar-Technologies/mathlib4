name = "DarcstarLean"
version = "0.1.0"
defaultTargets = ["DarcstarLean"]

# Org code should not rely on auto-bound implicits; matches mathlib's discipline.
[leanOptions]
autoImplicit = false
pp.unicode.fun = true

# Mathlib is pinned to a SHA that exists on the DarcStar mirror (which equals the
# corresponding upstream commit byte-for-byte, so upstream's binary cache applies).
# Pointing at the mirror rather than upstream is deliberate: the org controls the
# pin even if upstream history ever becomes unavailable.
#
# To bump: edit `rev` here to the mirror's current synced master SHA (or a release
# tag), then run `lake update mathlib` — mathlib's post-update hook also rewrites
# this project's lean-toolchain to match. Commit all three changed files.
[[require]]
name = "mathlib"
git = "https://github.com/DarcStar-Technologies/mathlib4.git"
rev = "9944fe2973b8dc0b86949101ed98232c07cd54a0"

[[lean_lib]]
name = "DarcstarLean"
