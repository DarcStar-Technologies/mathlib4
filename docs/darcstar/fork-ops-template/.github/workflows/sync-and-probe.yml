# P1.1 — Daily sync of the mathlib4 fork + cache-alignment probe.
#
# Lives in the DarcStar-Technologies/mathlib4-fork-ops repo (NOT in the fork:
# the fork's Actions are disabled by design, and its master must stay a pure
# fast-forward mirror with zero local commits).
#
# What it does, in order:
#   1. Guard  — fail (without syncing) if fork master has any local commits
#               (doctrine violation) or if the compare API is unreachable.
#   2. Sync   — fast-forward fork master from upstream via GitHub's
#               merge-upstream API. Anything other than a fast-forward or
#               "already up to date" fails the run.
#   3. Verify — the three cache-root files (lakefile.lean, lean-toolchain,
#               lake-manifest.json) are byte-identical to upstream
#               (blob-SHA comparison). Any diff = 100% cache loss = alert.
#   4. Probe  — light: `lake exe cache get` on two probe modules +
#               `lake build --no-build` (fails iff the cache didn't cover them).
#               Deep (Mondays, toolchain-bump days, or manual dispatch with
#               deep=true): full cache get + `lake build --no-build` over all
#               of Mathlib.
#   5. Alert  — job failure notifies watchers; optional Slack webhook.
#
# Required secret:
#   FORK_SYNC_TOKEN — fine-grained PAT, repository access limited to
#     DarcStar-Technologies/mathlib4, permissions: Contents (Read and write),
#     Metadata (Read). Used only for the merge-upstream call and API reads.
# Optional secret:
#   SLACK_WEBHOOK_URL — incoming-webhook URL for failure alerts.

name: Sync fork and probe cache alignment

on:
  schedule:
    - cron: '23 7 * * *' # daily, 07:23 UTC (off the hour to dodge cron congestion)
  workflow_dispatch:
    inputs:
      deep:
        description: 'Force the deep probe (full cache get + lake build --no-build)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: sync-and-probe
  cancel-in-progress: false

env:
  FORK_OWNER: DarcStar-Technologies
  FORK_REPO: mathlib4
  UPSTREAM: leanprover-community/mathlib4
  API: https://api.github.com

jobs:
  sync-and-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Guard — fork master must have zero local commits
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          cmp=$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$UPSTREAM/compare/master...$FORK_OWNER:master")
          ahead=$(jq -r '.ahead_by' <<<"$cmp")
          behind=$(jq -r '.behind_by' <<<"$cmp")
          echo "fork master: ahead_by=$ahead behind_by=$behind"
          if [ "$ahead" != "0" ]; then
            echo "::error::Doctrine violation: fork master has $ahead local commit(s)." \
                 "master must stay a pure fast-forward mirror. Not syncing." \
                 "Someone pushed to master — investigate before re-running."
            exit 1
          fi

      - name: Sync — fast-forward fork master from upstream
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          resp=$(curl -sS -w '\n%{http_code}' -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$API/repos/$FORK_OWNER/$FORK_REPO/merge-upstream" \
            -d '{"branch":"master"}')
          code=$(tail -n1 <<<"$resp")
          body=$(sed '$d' <<<"$resp")
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "::error::merge-upstream returned HTTP $code (409 = merge conflict:" \
                 "fork master diverged; restore it to a pure mirror)."
            exit 1
          fi
          merge_type=$(jq -r '.merge_type' <<<"$body")
          case "$merge_type" in
            fast-forward|none) echo "sync OK: $merge_type" ;;
            *) echo "::error::Unexpected merge_type '$merge_type' (a 'merge' means" \
                    "master had local commits — doctrine violation)."; exit 1 ;;
          esac

      - name: Verify — cache-root files byte-identical to upstream
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          for f in lakefile.lean lean-toolchain lake-manifest.json; do
            up=$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" \
              "$API/repos/$UPSTREAM/contents/$f?ref=master" | jq -r '.sha')
            fk=$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" \
              "$API/repos/$FORK_OWNER/$FORK_REPO/contents/$f?ref=master" | jq -r '.sha')
            if [ "$up" != "$fk" ]; then
              echo "::error::Cache-root file '$f' differs from upstream" \
                   "(blob $fk vs $up). This invalidates 100% of the cache."
              exit 1
            fi
            echo "$f OK ($fk)"
          done

      - name: Decide probe depth
        id: depth
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
          FORCE_DEEP: ${{ inputs.deep }}
        run: |
          set -euo pipefail
          deep=false
          reason="daily light probe"
          if [ "${FORCE_DEEP:-false}" = "true" ]; then
            deep=true; reason="manual dispatch"
          elif [ "$(date -u +%u)" = "1" ]; then
            deep=true; reason="weekly Monday deep probe"
          else
            since=$(date -u -d '26 hours ago' +%Y-%m-%dT%H:%M:%SZ)
            n=$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" \
              "$API/repos/$UPSTREAM/commits?path=lean-toolchain&since=$since&per_page=1" \
              | jq 'length')
            if [ "$n" != "0" ]; then deep=true; reason="lean-toolchain changed upstream in the last 26h"; fi
          fi
          echo "deep=$deep" >> "$GITHUB_OUTPUT"
          echo "probe depth: deep=$deep ($reason)"

      - name: Free runner disk (deep probe only)
        if: steps.depth.outputs.deep == 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          df -h /

      - name: Checkout fork master (post-sync)
        uses: actions/checkout@v4
        with:
          repository: DarcStar-Technologies/mathlib4
          ref: master
          path: mathlib4

      - name: Install elan
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Probe — light (cache hit on probe modules)
        if: steps.depth.outputs.deep != 'true'
        working-directory: mathlib4
        run: |
          set -euo pipefail
          lake exe cache get Mathlib/Init.lean Mathlib/Tactic/Common.lean
          # --no-build fails iff anything in the probe cone still needs compiling,
          # i.e. iff the cache did not actually cover it. Same invocation upstream
          # CI uses to assert cache coverage (build_template.yml).
          lake build --no-build --rehash Mathlib.Init Mathlib.Tactic.Common
          echo "light probe OK: upstream cache covers the probe cone"

      - name: Probe — deep (full cache, nothing left to build)
        if: steps.depth.outputs.deep == 'true'
        working-directory: mathlib4
        run: |
          set -euo pipefail
          lake exe cache get
          lake build --no-build --rehash Mathlib
          echo "deep probe OK: upstream cache covers all of Mathlib"

      - name: Alert Slack on failure (optional)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          [ -z "$SLACK_WEBHOOK_URL" ] && { echo "no webhook configured; relying on GitHub notifications"; exit 0; }
          curl -sS -X POST -H 'Content-type: application/json' --data \
            "{\"text\":\"mathlib4 fork sync/probe FAILED: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
            "$SLACK_WEBHOOK_URL"
